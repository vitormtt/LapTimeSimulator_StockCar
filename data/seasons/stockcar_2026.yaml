# Calendário canônico BRB Stock Car Pro Series 2026
# Fonte primária: CBA Regulamento Desportivo 2026 + comunicados oficiais da Stock Car.
# Última atualização: 2026-03-11
# Alterações aplicadas:
#   - Etapa 2 atualizada de Santa Cruz do Sul para Cascavel (comunicado oficial Stock Car).
#   - Evento 08/11 Interlagos removido (programação F4 Brasil, não etapa Stock Pro).
#   - Etapa 9 marcada como endurance_3h conforme regulamento desportivo.
#   - Velopark: city corrigida para Nova Santa Rita, RS.

season: 2026
series: BRB Stock Car Pro Series
round_count: 11
championship_administrator: CBA
regulation_refs:
  - cba_regulamento_desportivo_2026
  - cba_regulamento_tecnico_2026

weekend_formats:
  sprint_main:
    description: "Sprint (sábado) + Corrida Principal (domingo)"
    sprint:
      nominal_day: saturday
      duration_min: 30
      plus_one_lap: true
    main:
      nominal_day: sunday
      duration_min: 50
      plus_one_lap: true
    note: "Horários e duração sujeitos ao RPP de cada etapa."
  endurance_3h:
    description: "Prova endurance única com troca de piloto obrigatória"
    race:
      duration_h: 3
      plus_one_lap: true
      driver_change_mandatory: true
    note: "Regulamento específico da etapa endurance a confirmar no RPP."

